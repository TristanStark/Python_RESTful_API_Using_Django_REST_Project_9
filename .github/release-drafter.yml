name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
      - "minor"
  - title: "Fixes"
    labels:
      - "fix"
      - "bug"
      - "patch"
  - title: "Maintenance"
    labels:
      - "chore"
      - "ci"
      - "dependencies"
      - "documentation"

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
no-changes-template: "- No user-facing changes in this release."

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
      - "feature"
  patch:
    labels:
      - "patch"
      - "fix"
      - "bug"
  default: patch

template: |
  ## Changes

  $CHANGES
